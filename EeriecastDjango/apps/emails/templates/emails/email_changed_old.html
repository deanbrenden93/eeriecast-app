<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__SUBJECT__</title>
  </head>
  <body style="margin:0; padding:0; background-color:__BACKGROUND__; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:__BACKGROUND__; padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="560" style="width:560px; max-width:560px; background-color:__CARD_BACKGROUND__; border:1px solid __BORDER__; border-radius:12px; overflow:hidden;">
            <tr>
              <td align="center" style="padding:32px 32px 20px 32px;">
                <img src="__LOGO_URL__" alt="__APP_NAME__" width="160" style="display:block; width:160px; height:auto; filter:invert(1); -webkit-filter:invert(1);" />
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px;">
                <div style="height:2px; background:linear-gradient(90deg, transparent, #dc2626, transparent); border-radius:1px;"></div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; color:__TEXT__; font-size:16px; line-height:26px;">
                <h1 style="margin:0 0 16px 0; font-size:22px; font-weight:700; color:#ffffff; line-height:30px;">Your Email Was Changed</h1>
                <p style="margin:0 0 16px 0;">The email address on your Eeriecast account has been updated.</p>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 20px 0; width:100%;">
                  <tr>
                    <td style="padding:14px 16px; background-color:#0a0a12; border-radius:8px; border:1px solid __BORDER__; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:14px; color:__SUBTLE_TEXT__; line-height:22px;">
                      <span>Previous:</span> <span style="color:__TEXT__;">__OLD_EMAIL__</span><br/>
                      <span>New:</span> <span style="color:__TEXT__;">__NEW_EMAIL__</span>
                    </td>
                  </tr>
                </table>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;">
                  <tr>
                    <td style="padding:14px 16px; background-color:#0a0a12; border-radius:8px; border:1px solid __BORDER__; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:13px; color:__SUBTLE_TEXT__; line-height:20px;">
                      <strong style="color:__TEXT__;">Didn't make this change?</strong><br/>Contact us immediately at <a href="mailto:__SUPPORT_EMAIL__" style="color:#dc2626; text-decoration:underline;">__SUPPORT_EMAIL__</a> to secure your account.
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px;">
                <div style="height:1px; background-color:__BORDER__;"></div>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px 24px 32px; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:12px; color:__SUBTLE_TEXT__; line-height:18px;">
                Need help? Reach us at <a href="mailto:__SUPPORT_EMAIL__" style="color:__SUBTLE_TEXT__; text-decoration:underline;">__SUPPORT_EMAIL__</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
